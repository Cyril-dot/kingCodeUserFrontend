<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BetCash — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
:root {
  --bg0:#000D1A;--bg1:#001022;--bg2:#00152D;--bg3:#001D3D;
  --accent:#1565C0;--accentBright:#2196F3;
  --accentBg:rgba(33,150,243,0.13);
  --green:#22C55E;--greenBg:rgba(34,197,94,0.12);
  --red:#EF4444;--redBg:rgba(239,68,68,0.12);
  --t1:#FFFFFF;--t2:#B0C4DE;--t3:#5F7FA0;
  --border:rgba(255,255,255,0.09);--borderHov:rgba(255,255,255,0.18);--borderAcc:rgba(33,150,243,0.50);
  --shadow:0 8px 40px rgba(0,0,0,0.55);
  --ff:'DM Sans',sans-serif;--ffC:'Barlow Condensed',sans-serif;
  --nav:66px;
}
[data-theme="light"]{
  --bg0:#F0F6FF;--bg1:#FFFFFF;--bg2:#E8F0FE;--bg3:#D2E3FC;
  --accent:#1565C0;--accentBright:#1976D2;
  --accentBg:rgba(21,101,192,0.07);
  --green:#16A34A;--greenBg:rgba(22,163,74,0.09);
  --red:#DC2626;--redBg:rgba(220,38,38,0.09);
  --t1:#001A33;--t2:#1E3A5F;--t3:#5C7DA0;
  --border:rgba(21,101,192,0.10);--borderHov:rgba(21,101,192,0.22);--borderAcc:rgba(21,101,192,0.40);
  --shadow:0 8px 40px rgba(21,101,192,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent;height:100%}
body{font-family:var(--ff);background:var(--bg0);color:var(--t1);min-height:100vh;overflow-x:hidden;line-height:1.5;transition:background .25s,color .25s}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(33,150,243,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(33,150,243,0.04) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
.blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.blob-1{width:520px;height:520px;top:-140px;left:-120px;background:rgba(21,101,192,0.12)}
.blob-2{width:380px;height:380px;bottom:-80px;right:-80px;background:rgba(33,150,243,0.07)}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav);background:linear-gradient(to bottom,var(--accent) 0,var(--accent) 3px,rgba(0,13,26,0.97) 3px);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}
[data-theme="light"] nav{background:linear-gradient(to bottom,var(--accent) 0,var(--accent) 3px,rgba(240,246,255,0.98) 3px)}
.logo{font-family:var(--ffC);font-size:22px;font-weight:800;letter-spacing:1px;color:var(--t1);text-decoration:none;flex:1;display:flex;align-items:center;gap:6px}
.logo-icon{width:30px;height:30px;background:var(--accentBright);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px;color:#fff}
.lp{color:#fff}.ls{color:var(--accentBright)}
[data-theme="light"] .lp{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:8px}
.icon-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-btn:hover{background:rgba(255,255,255,0.14)}
.icon-btn svg{width:16px;height:16px;color:var(--t2)}
.nav-btn{font-size:13px;font-weight:700;color:#fff;text-decoration:none;padding:8px 18px;border-radius:9px;background:var(--accent);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.nav-btn:hover{background:var(--accentBright)}
.nav-btn svg{width:14px;height:14px}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;padding-top:var(--nav)}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px 60px}
.auth-card{width:100%;max-width:440px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 36px;box-shadow:var(--shadow);animation:slideUp .45s cubic-bezier(.22,.68,0,1.2) both;position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accentBright),var(--accent))}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.auth-header{text-align:center;margin-bottom:30px}
.auth-icon{width:58px;height:58px;background:var(--accentBg);border:1px solid var(--borderAcc);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.auth-icon svg{width:26px;height:26px;color:var(--accentBright)}
.auth-title{font-family:var(--ffC);font-size:30px;font-weight:800;letter-spacing:.5px;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--t2);line-height:1.6}
.auth-sub a{color:var(--accentBright);text-decoration:none;font-weight:600}
.auth-sub a:hover{text-decoration:underline}
.form-group{margin-bottom:18px}
.form-label{display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.6px}
.form-label a{color:var(--accentBright);text-decoration:none;font-weight:600;font-size:11px;text-transform:none;letter-spacing:0}
.form-label a:hover{text-decoration:underline}
.input-wrap{position:relative}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none}
.input-icon svg{width:16px;height:16px;color:var(--t3)}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px 12px 42px;font-family:var(--ff);font-size:14px;font-weight:500;color:var(--t1);transition:all .2s;outline:none}
.form-input::placeholder{color:var(--t3)}
.form-input:focus{border-color:var(--borderAcc);background:var(--bg2);box-shadow:0 0 0 3px var(--accentBg)}
.form-input.valid{border-color:var(--green)}.form-input.error{border-color:var(--red)}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;background:none;border:none;color:var(--t3);padding:4px;display:flex;align-items:center;transition:color .15s}
.pw-toggle:hover{color:var(--t2)}.pw-toggle svg{width:16px;height:16px}
.form-hint{font-size:11px;margin-top:5px;color:var(--t3);display:flex;align-items:center;gap:4px;min-height:16px}
.form-hint svg{width:11px;height:11px;flex-shrink:0}
.form-hint.err{color:var(--red)}.form-hint.ok{color:var(--green)}
.form-check{display:flex;align-items:center;gap:10px;margin-bottom:24px;cursor:pointer;user-select:none;position:relative}
.form-check input[type=checkbox]{position:absolute;opacity:0;width:0;height:0}
.custom-cb{width:18px;height:18px;border:1.5px solid var(--border);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg3);transition:all .15s}
.form-check input[type=checkbox]:checked ~ .custom-cb{background:var(--accent);border-color:var(--accent)}
.form-check input[type=checkbox]:checked ~ .custom-cb svg{display:block}
.custom-cb svg{display:none;width:11px;height:11px;color:#fff}
.check-label{font-size:13px;color:var(--t2)}
.alert{display:none;background:var(--redBg);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:var(--red);align-items:center;gap:10px}
.alert.show{display:flex}.alert svg{width:16px;height:16px;flex-shrink:0}
.alert-success{display:none;background:var(--greenBg);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:var(--green);align-items:center;gap:10px}
.alert-success.show{display:flex}.alert-success svg{width:16px;height:16px;flex-shrink:0}
.btn-primary{width:100%;padding:14px;border-radius:11px;background:var(--accent);color:#fff;font-family:var(--ffC);font-size:17px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 20px rgba(21,101,192,.35)}
.btn-primary:hover{background:var(--accentBright);transform:translateY(-2px);box-shadow:0 8px 32px rgba(33,150,243,.5)}
.btn-primary:active{transform:translateY(0)}.btn-primary svg{width:18px;height:18px}.btn-primary.loading{opacity:.7;pointer-events:none}
.trust-row{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.tbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);background:var(--accentBg);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.tbadge svg{width:11px;height:11px;color:var(--green)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite}
@media(max-width:480px){.auth-card{padding:28px 20px;border-radius:16px}nav{padding:0 14px}}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg data-lucide="shield-check"></svg></div>
    <span class="lp">BET</span><span class="ls">C</span><span class="lp">ASH</span>
  </a>
  <div class="nav-right">
    <div class="icon-btn" onclick="toggleTheme()"><svg data-lucide="moon" id="themeIco"></svg></div>
    <a href="register.html" class="nav-btn"><svg data-lucide="user-plus"></svg>Register Free</a>
  </div>
</nav>
<div class="page">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon"><svg data-lucide="log-in"></svg></div>
        <div class="auth-title">Welcome Back</div>
        <div class="auth-sub">Sign in to your BetCash account.<br>No account? <a href="register.html">Register free →</a></div>
      </div>
      <div class="alert" id="alertBox"><svg data-lucide="alert-circle"></svg><span id="alertMsg"></span></div>
      <div class="alert-success" id="successBox"><svg data-lucide="check-circle"></svg><span id="successMsg">Signed in! Redirecting…</span></div>
      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrap">
            <div class="input-icon"><svg data-lucide="mail"></svg></div>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <div class="form-hint" id="emailHint"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password <a href="#">Forgot password?</a></label>
          <div class="input-wrap">
            <div class="input-icon"><svg data-lucide="lock"></svg></div>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw()"><svg data-lucide="eye" id="eyeIco"></svg></button>
          </div>
          <div class="form-hint" id="pwHint"></div>
        </div>
        <label class="form-check">
          <input type="checkbox" id="remember">
          <div class="custom-cb"><svg data-lucide="check"></svg></div>
          <span class="check-label">Keep me signed in</span>
        </label>
        <button type="submit" class="btn-primary" id="submitBtn">
          <svg data-lucide="log-in" id="submitIco"></svg>
          <span id="submitTxt">Sign In to BetCash</span>
        </button>
      </form>
      <div class="trust-row">
        <span class="tbadge"><svg data-lucide="shield-check"></svg>Licensed Ghana</span>
        <span class="tbadge"><svg data-lucide="lock"></svg>SSL Encrypted</span>
        <span class="tbadge"><svg data-lucide="zap"></svg>Instant Access</span>
      </div>
    </div>
  </div>
</div>
<script>
const BASE = 'https://kingcodebackendgames.onrender.com';

// ── These match index.html's primary getToken() / getUser() keys ──
const TOKEN_KEY = 'gstake_token';
const USER_KEY  = 'gstake_user';

window.addEventListener('load', () => lucide.createIcons());

// If already logged in → go home
if (localStorage.getItem(TOKEN_KEY) || sessionStorage.getItem(TOKEN_KEY)) {
  window.location.href = 'index.html';
}

function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeIco').setAttribute('data-lucide', dark ? 'sun' : 'moon');
  lucide.createIcons();
}

function togglePw() {
  const inp = document.getElementById('password');
  const ico = document.getElementById('eyeIco');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.setAttribute('data-lucide', inp.type === 'text' ? 'eye-off' : 'eye');
  lucide.createIcons();
}

function showHint(id, msg, type) {
  const el = document.getElementById(id);
  if (!msg) { el.innerHTML = ''; return; }
  el.innerHTML = `<svg data-lucide="${type === 'err' ? 'x-circle' : 'check-circle'}"></svg>${msg}`;
  el.className = 'form-hint ' + (type || '');
  lucide.createIcons();
}

document.getElementById('email').addEventListener('blur', function () {
  if (!this.value) return;
  const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value);
  this.classList.toggle('valid', ok);
  this.classList.toggle('error', !ok);
  showHint('emailHint', ok ? 'Looks good!' : 'Enter a valid email.', ok ? 'ok' : 'err');
});

async function handleLogin(e) {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;
  const alertBox = document.getElementById('alertBox');
  alertBox.classList.remove('show');

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('alertMsg').textContent = 'Please enter a valid email address.';
    alertBox.classList.add('show'); return;
  }
  if (password.length < 6) {
    document.getElementById('alertMsg').textContent = 'Password is too short.';
    alertBox.classList.add('show'); return;
  }

  const btn = document.getElementById('submitBtn');
  const ico = document.getElementById('submitIco');
  const txt = document.getElementById('submitTxt');
  btn.classList.add('loading');
  ico.className = 'spin';
  ico.setAttribute('data-lucide', 'loader');
  txt.textContent = 'Signing in…';
  lucide.createIcons();

  try {
    const res  = await fetch(`${BASE}/api/v1/users/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (res.ok && data.data?.token) {
      // Save under gstake_ keys — matches index.html getToken() / getUser()
      const storage = remember ? localStorage : sessionStorage;
      storage.setItem(TOKEN_KEY, data.data.token);
      storage.setItem(USER_KEY, JSON.stringify({
        email:     data.data.email     || email,
        firstName: data.data.firstName || email.split('@')[0],
        lastName:  data.data.lastName  || '',
        role:      data.data.role      || 'USER',
        currency:  data.data.currency  || 'GHS',
      }));

      ico.removeAttribute('class');
      ico.setAttribute('data-lucide', 'check-circle');
      txt.textContent = 'Welcome back!';
      const name = data.data.firstName || email.split('@')[0];
      document.getElementById('successMsg').textContent = `Welcome back, ${name}! Redirecting…`;
      document.getElementById('successBox').classList.add('show');
      lucide.createIcons();

      setTimeout(() => {
        const params = new URLSearchParams(window.location.search);
        const returnUrl = params.get('returnUrl');
        if (returnUrl) { window.location.href = returnUrl; }
        else if ((data.data.role || '').toUpperCase() === 'ADMIN') { window.location.href = 'admin.html'; }
        else { window.location.href = 'index.html'; }
      }, 900);

    } else {
      throw new Error(data.message || 'Invalid email or password. Please try again.');
    }
  } catch (err) {
    document.getElementById('alertMsg').textContent = err.message;
    alertBox.classList.add('show');
    btn.classList.remove('loading');
    ico.removeAttribute('class');
    ico.setAttribute('data-lucide', 'log-in');
    txt.textContent = 'Sign In to BetCash';
    lucide.createIcons();
  }
}
</script>
</body>
</html>
