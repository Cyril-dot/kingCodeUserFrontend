<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GStake — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
:root {
  --bg0:#060A14;--bg1:#0A1020;--bg2:#0F1828;--bg3:#162035;
  --accent:#3B82F6;--accentBg:rgba(59,130,246,0.10);
  --accentHov:#60A5FA;
  --green:#22C55E;--greenBg:rgba(34,197,94,0.12);
  --red:#EF4444;--redBg:rgba(239,68,68,0.10);
  --t1:#F0F6FF;--t2:#8BA3C7;--t3:#4A5E7A;
  --border:rgba(255,255,255,0.07);--borderHov:rgba(255,255,255,0.14);--borderAcc:rgba(59,130,246,0.45);
  --shadow:0 8px 40px rgba(0,0,0,0.6);
  --ff:'DM Sans',sans-serif;--ffC:'Barlow Condensed',sans-serif;
  --nav:60px;
}
[data-theme="light"]{
  --bg0:#EFF4FF;--bg1:#F5F8FF;--bg2:#FFFFFF;--bg3:#FFFFFF;
  --accent:#2563EB;--accentBg:rgba(37,99,235,0.08);
  --accentHov:#1D4ED8;
  --green:#16A34A;--greenBg:rgba(22,163,74,0.09);
  --red:#DC2626;--redBg:rgba(220,38,38,0.09);
  --t1:#0F172A;--t2:#475569;--t3:#94A3B8;
  --border:rgba(0,0,0,0.07);--borderHov:rgba(0,0,0,0.14);--borderAcc:rgba(37,99,235,0.45);
  --shadow:0 8px 40px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent;height:100%}
body{font-family:var(--ff);background:var(--bg0);color:var(--t1);min-height:100vh;overflow-x:hidden;line-height:1.5;transition:background .25s,color .25s}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
[data-theme="light"] body::before{background-image:linear-gradient(rgba(0,0,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.03) 1px,transparent 1px)}
.blob{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
.blob-1{width:500px;height:500px;top:-120px;left:-100px;background:rgba(59,130,246,0.10)}
.blob-2{width:400px;height:400px;bottom:-80px;right:-80px;background:rgba(147,197,253,0.06)}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav);background:rgba(6,10,20,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}
[data-theme="light"] nav{background:rgba(245,248,255,0.96)}
.logo{font-family:var(--ffC);font-size:26px;font-weight:800;letter-spacing:1px;color:var(--t1);text-decoration:none;flex:1}
.logo em{color:var(--accent);font-style:normal}
.nav-right{display:flex;align-items:center;gap:8px}
.icon-btn{background:transparent;border:1px solid var(--border);width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-btn:hover{border-color:var(--borderHov);background:var(--bg3)}
.icon-btn svg{width:16px;height:16px;color:var(--t2)}
.nav-link{font-size:13px;font-weight:600;color:var(--t2);text-decoration:none;padding:8px 14px;border-radius:9px;border:1px solid var(--border);transition:all .15s}
.nav-link:hover{border-color:var(--borderHov);color:var(--t1);background:var(--bg3)}
.nav-link-accent{background:var(--accent);color:#fff;border-color:transparent;font-weight:700}
.nav-link-accent:hover{background:var(--accentHov);border-color:transparent;filter:none}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;padding-top:var(--nav)}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px 60px}
.auth-card{width:100%;max-width:440px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 36px;box-shadow:var(--shadow);animation:slideUp .45s cubic-bezier(.22,.68,0,1.2) both}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.auth-header{text-align:center;margin-bottom:32px}
.auth-icon{width:58px;height:58px;background:var(--accentBg);border:1px solid var(--borderAcc);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.auth-icon svg{width:26px;height:26px;color:var(--accent)}
.auth-title{font-family:var(--ffC);font-size:30px;font-weight:800;letter-spacing:.5px;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--t2);line-height:1.6}
.auth-sub a{color:var(--accent);text-decoration:none;font-weight:600}
.auth-sub a:hover{text-decoration:underline}
.form-group{margin-bottom:18px;position:relative}
.form-label{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.6px}
.form-label a{color:var(--accent);text-decoration:none;font-weight:600;font-size:12px;text-transform:none;letter-spacing:0}
.form-label a:hover{text-decoration:underline}
.input-wrap{position:relative}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none}
.input-icon svg{width:16px;height:16px;color:var(--t3)}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px 12px 42px;font-family:var(--ff);font-size:14px;font-weight:500;color:var(--t1);transition:all .2s;outline:none}
.form-input::placeholder{color:var(--t3)}
.form-input:focus{border-color:var(--borderAcc);background:var(--bg2);box-shadow:0 0 0 3px var(--accentBg)}
.form-input.valid{border-color:var(--green)}
.form-input.error{border-color:var(--red)}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;background:none;border:none;color:var(--t3);padding:4px;display:flex;align-items:center;transition:color .15s}
.pw-toggle:hover{color:var(--t2)}
.pw-toggle svg{width:16px;height:16px}
.form-hint{font-size:11px;margin-top:5px;color:var(--t3);display:flex;align-items:center;gap:4px}
.form-hint svg{width:11px;height:11px;flex-shrink:0}
.form-hint.err{color:var(--red)}
.form-hint.ok{color:var(--green)}
.form-check{display:flex;align-items:center;gap:10px;margin-bottom:24px;cursor:pointer;user-select:none}
.custom-cb{width:18px;height:18px;border:1.5px solid var(--border);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg3);transition:all .15s;position:relative}
.form-check input[type=checkbox]{position:absolute;opacity:0;width:0;height:0}
.form-check input[type=checkbox]:checked ~ .custom-cb{background:var(--accent);border-color:var(--accent)}
.form-check input[type=checkbox]:checked ~ .custom-cb svg{display:block}
.custom-cb svg{display:none;width:11px;height:11px;color:#fff}
.check-label{font-size:13px;color:var(--t2)}
.btn-primary{width:100%;padding:14px;border-radius:11px;background:var(--accent);color:#fff;font-family:var(--ffC);font-size:17px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 20px rgba(59,130,246,.35)}
.btn-primary:hover{background:var(--accentHov);transform:translateY(-2px);box-shadow:0 8px 32px rgba(59,130,246,.5)}
.btn-primary:active{transform:translateY(0)}
.btn-primary svg{width:18px;height:18px}
.btn-primary.loading{opacity:.7;pointer-events:none}
.trust-row{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap;justify-content:center}
.tbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);background:var(--accentBg);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.tbadge svg{width:11px;height:11px;color:var(--accent)}
.alert{display:none;background:var(--redBg);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:13px;color:var(--red);align-items:center;gap:10px}
.alert.show{display:flex}
.alert svg{width:16px;height:16px;flex-shrink:0}
.alert-success{display:none;background:var(--greenBg);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:13px;color:var(--green);align-items:center;gap:10px}
.alert-success.show{display:flex}
.alert-success svg{width:16px;height:16px;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite}
@media(max-width:480px){.auth-card{padding:28px 20px;border-radius:16px}.auth-title{font-size:24px}nav{padding:0 14px}}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<nav>
  <a href="index.html" class="logo">CASH<em>B</em>ET</a>
  <div class="nav-right">
    <div class="icon-btn" onclick="toggleTheme()"><svg data-lucide="moon" id="themeIco"></svg></div>
    <a href="register.html" class="nav-link nav-link-accent">Register Free</a>
  </div>
</nav>
<div class="page">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon"><svg data-lucide="shield-check"></svg></div>
        <div class="auth-title">Welcome Back</div>
        <div class="auth-sub">Sign in to your GStake account.<br>Don't have one? <a href="register.html">Register free →</a></div>
      </div>
      <div class="alert" id="alertBox"><svg data-lucide="alert-circle"></svg><span id="alertMsg"></span></div>
      <div class="alert-success" id="successBox"><svg data-lucide="check-circle"></svg><span id="successMsg">Signed in! Redirecting…</span></div>
      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrap">
            <div class="input-icon"><svg data-lucide="mail"></svg></div>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <div class="form-hint" id="emailHint"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password<a href="forgot-password.html">Forgot password?</a></label>
          <div class="input-wrap">
            <div class="input-icon"><svg data-lucide="lock"></svg></div>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('password','eyeIcon1')"><svg data-lucide="eye" id="eyeIcon1"></svg></button>
          </div>
          <div class="form-hint" id="pwHint"></div>
        </div>
        <label class="form-check">
          <input type="checkbox" id="remember">
          <div class="custom-cb"><svg data-lucide="check"></svg></div>
          <span class="check-label">Keep me signed in</span>
        </label>
        <button type="submit" class="btn-primary" id="submitBtn">
          <svg data-lucide="log-in" id="submitIco"></svg>
          <span id="submitTxt">Sign In to GStake</span>
        </button>
      </form>
      <div class="trust-row">
        <span class="tbadge"><svg data-lucide="shield-check"></svg>SSL Encrypted</span>
        <span class="tbadge"><svg data-lucide="lock"></svg>Data Protected</span>
        <span class="tbadge"><svg data-lucide="zap"></svg>Instant Access</span>
      </div>
    </div>
  </div>
</div>
<script>
const API_BASE = 'https://kikiwebbackend.onrender.com';

window.addEventListener('load', () => lucide.createIcons());

if (localStorage.getItem('gstake_token') || sessionStorage.getItem('gstake_token')) {
  window.location.href = 'index.html';
}

function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeIco').setAttribute('data-lucide', dark ? 'sun' : 'moon');
  lucide.createIcons();
}

function togglePw(inputId, iconId) {
  const inp = document.getElementById(inputId);
  const ico = document.getElementById(iconId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.setAttribute('data-lucide', inp.type === 'text' ? 'eye-off' : 'eye');
  lucide.createIcons();
}

function showHint(id, msg, type) {
  const el = document.getElementById(id);
  el.innerHTML = msg
    ? `<svg data-lucide="${type === 'err' ? 'x-circle' : 'check-circle'}"></svg>${msg}`
    : '';
  el.className = 'form-hint' + (type ? ' ' + type : '');
  lucide.createIcons();
}

const vEmail = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

document.getElementById('email').addEventListener('blur', function () {
  if (!this.value) return;
  const ok = vEmail(this.value);
  this.classList.toggle('valid', ok);
  this.classList.toggle('error', !ok);
  showHint('emailHint', ok ? 'Looks good!' : 'Enter a valid email.', ok ? 'ok' : 'err');
});

async function handleLogin(e) {
  e.preventDefault();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;
  const alertBox = document.getElementById('alertBox');

  alertBox.classList.remove('show');

  if (!vEmail(email) || password.length < 6) {
    document.getElementById('alertMsg').textContent = 'Please fill in all fields correctly.';
    alertBox.classList.add('show');
    return;
  }

  const btn = document.getElementById('submitBtn');
  const ico = document.getElementById('submitIco');
  const txt = document.getElementById('submitTxt');
  btn.classList.add('loading');
  ico.setAttribute('data-lucide', 'loader');
  ico.className = 'spin';
  txt.textContent = 'Signing in…';
  lucide.createIcons();

  try {
    const res  = await fetch(`${API_BASE}/api/v1/users/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (res.ok && data.data?.token) {
      const storage = remember ? localStorage : sessionStorage;

      storage.setItem('gstake_token', data.data.token);
      storage.setItem('gstake_user', JSON.stringify({
        email:     data.data.email     || email,
        firstName: data.data.firstName || email.split('@')[0],
        lastName:  data.data.lastName  || '',
        role:      data.data.role      || 'USER',
        currency:  data.data.currency  || 'GHS',
      }));

      ico.removeAttribute('class');
      ico.setAttribute('data-lucide', 'check-circle');
      txt.textContent = 'Welcome back!';
      const firstName = data.data.firstName || email.split('@')[0];
      document.getElementById('successMsg').textContent = `Welcome back, ${firstName}! Redirecting…`;
      document.getElementById('successBox').classList.add('show');
      lucide.createIcons();

      setTimeout(() => {
        const params    = new URLSearchParams(window.location.search);
        const returnUrl = params.get('returnUrl');
        const role      = data.data.role || 'USER';
        if (returnUrl) {
          window.location.href = returnUrl;
        } else if (role === 'ADMIN') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'index.html';
        }
      }, 800);

    } else {
      throw new Error(data.message || 'Invalid email or password');
    }
  } catch (err) {
    document.getElementById('alertMsg').textContent = err.message;
    alertBox.classList.add('show');
    btn.classList.remove('loading');
    ico.removeAttribute('class');
    ico.setAttribute('data-lucide', 'log-in');
    txt.textContent = 'Sign In to GStake';
    lucide.createIcons();
  }
}
</script>
</body>
</html>
